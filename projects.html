<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projets – Lorenzo Segoni</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      line-height: 1.6;
      color: #333;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      color: #222;
    }

    .intro {
      margin-bottom: 30px;
      color: #555;
      font-size: 1.05em;
    }

    .search-container {
      margin: 30px 0;
    }

    #search-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 1em;
      border: 2px solid #ddd;
      border-radius: 5px;
      outline: none;
      transition: border-color 0.3s;
    }

    #search-input:focus {
      border-color: #0077cc;
    }

    .section {
      margin-top: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid #ccc;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-size: 1.8em;
      margin-bottom: 20px;
      color: #222;
      text-transform: capitalize;
    }

    .projet {
      margin-bottom: 25px;
    }

    .projet-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .projet-nom {
      color: #0077cc;
      text-decoration: underline;
      font-size: 1.2em;
      font-weight: 500;
    }

    .projet-nom:hover {
      color: #005fa3;
    }

    .projet-meta {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .projet-lieu {
      color: #999;
      font-size: 0.95em;
    }

    .projet-lieu::before {
      content: "📍 ";
      font-size: 0.85em;
    }

    .projet-date {
      color: #999;
      font-size: 0.95em;
    }

    .projet-date::before {
      content: "🗓 ";
      font-size: 0.85em;
    }

    .projet-description {
      color: #333;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      color: #999;
      padding: 40px;
    }

    .error {
      color: #d00;
      padding: 20px;
      background: #fee;
      border-radius: 5px;
    }

    .back-link {
      margin-top: 50px;
      display: inline-block;
    }

    .back-link a {
      color: #0077cc;
      text-decoration: none;
      font-size: 1em;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .no-results {
      text-align: center;
      color: #999;
      padding: 40px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Mes projets</h1>

  <div class="intro">
    Voici la liste de mes projets personnels et académiques organisés par catégorie. Tous les projets sont synchronisés depuis mon dépôt
    <a href="https://github.com/lorenzosegoni/projects" target="_blank" style="color: #0077cc;">projects</a>.
  </div>

  <div class="search-container">
    <input
      type="text"
      id="search-input"
      placeholder="Rechercher un projet, une catégorie ou un mot-clé..."
    >
  </div>

  <div id="content" class="loading">Chargement des projets...</div>

  <div class="back-link">
    <a href="/">← Retour à l'accueil</a>
  </div>

  <script>
    const REPO = "lorenzosegoni/projects";
    let allData = [];

    async function fetchMetadata(folderPath) {
      try {
        const url = `https://api.github.com/repos/${REPO}/contents/${folderPath}/metadata.json`;
        const response = await fetch(url);
        if (!response.ok) return null;
        const data = await response.json();

        const binaryString = atob(data.content);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        const decoder = new TextDecoder('utf-8');
        const content = decoder.decode(bytes);

        return JSON.parse(content);
      } catch (err) {
        console.error(`Erreur metadata pour ${folderPath}:`, err);
        return null;
      }
    }

    async function loadProjects() {
      try {
        const url = `https://api.github.com/repos/${REPO}/contents/`;
        const response = await fetch(url);
        const folders = await response.json();

        if (!Array.isArray(folders)) {
          throw new Error("Format de réponse invalide");
        }

        const projectsData = {};

        for (const folder of folders) {
          if (folder.type === "dir" && folder.name.includes(".")) {
            const [categorie, projet] = folder.name.split(".");

            const metadata = await fetchMetadata(folder.name);

            if (!metadata) continue;

            if (!projectsData[categorie]) {
              projectsData[categorie] = [];
            }

            projectsData[categorie].push({
              categorie: categorie,
              projet: projet,
              nom: metadata.nom || projet.replace(/_/g, " "),
              description: metadata.description || "",
              lieu: metadata.lieu || "",
              date: metadata.date || "",
              url: folder.html_url,
            });
          }
        }

        allData = projectsData;
        displayProjects(projectsData);

      } catch (err) {
        document.getElementById("content").innerHTML =
          `<div class="error">Erreur lors du chargement des projets : ${err.message}</div>`;
      }
    }

    function displayProjects(projectsData) {
      const container = document.getElementById("content");

      if (Object.keys(projectsData).length === 0) {
        container.innerHTML = '<div class="no-results">Aucun projet trouvé.</div>';
        return;
      }

      container.innerHTML = "";

      const categories = Object.keys(projectsData).sort();

      categories.forEach(categorieName => {
        const section = document.createElement("div");
        section.className = "section";

        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = categorieName.replace(/_/g, " ");
        section.appendChild(title);

        projectsData[categorieName].forEach(project => {
          const projetDiv = document.createElement("div");
          projetDiv.className = "projet";
          projetDiv.dataset.keywords = `${categorieName} ${project.nom} ${project.description} ${project.lieu}`.toLowerCase();

          const header = document.createElement("div");
          header.className = "projet-header";

          const nomLink = document.createElement("a");
          nomLink.href = project.url;
          nomLink.target = "_blank";
          nomLink.className = "projet-nom";
          nomLink.textContent = project.nom;

          header.appendChild(nomLink);

          const meta = document.createElement("div");
          meta.className = "projet-meta";

          if (project.lieu) {
            const lieu = document.createElement("span");
            lieu.className = "projet-lieu";
            lieu.textContent = project.lieu;
            meta.appendChild(lieu);
          }

          if (project.date) {
            const date = document.createElement("span");
            date.className = "projet-date";
            date.textContent = project.date;
            meta.appendChild(date);
          }

          if (project.lieu || project.date) {
            header.appendChild(meta);
          }

          const description = document.createElement("div");
          description.className = "projet-description";
          description.textContent = project.description;

          projetDiv.appendChild(header);
          projetDiv.appendChild(description);

          section.appendChild(projetDiv);
        });

        container.appendChild(section);
      });
    }

    function filterProjects(searchTerm) {
      const term = searchTerm.toLowerCase().trim();

      if (term === "") {
        displayProjects(allData);
        return;
      }

      const filtered = {};

      Object.keys(allData).forEach(categorie => {
        const matching = allData[categorie].filter(project => {
          const searchText = `${categorie} ${project.nom} ${project.description} ${project.lieu}`.toLowerCase();
          return searchText.includes(term);
        });

        if (matching.length > 0) {
          filtered[categorie] = matching;
        }
      });

      displayProjects(filtered);
    }

    document.getElementById("search-input").addEventListener("input", (e) => {
      filterProjects(e.target.value);
    });

    loadProjects();
  </script>
</body>
</html>
